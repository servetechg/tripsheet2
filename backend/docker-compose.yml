services:
  postgres:
    image: postgres:16-alpine
    container_name: tripsheet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tripsheet
      POSTGRES_PASSWORD: tripsheet
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tripsheet']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tripsheet-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

