# Shared infrastructure — run once on the VPS.
# Usage:
#   docker network create tripsheet-net || true
#   docker compose -f deploy/compose.infra.yml --env-file /opt/tripsheet/secrets/infra.env up -d

name: tripsheet-infra

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tripsheet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    networks:
      - tripsheet-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER']
      interval: 5s
      timeout: 5s
      retries: 20
    # No host ports — internal only

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    networks:
      - tripsheet-net
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 5s
      timeout: 5s
      retries: 20
    # No host ports — internal only

volumes:
  postgres_data:
  redis_data:

networks:
  tripsheet-net:
    external: true
