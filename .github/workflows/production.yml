name: production

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      color:
        description: 'Target color (blue/green). Leave empty to auto-pick inactive.'
        required: false
        default: ''

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push gateway
        uses: docker/build-push-action@v6
        with:
          context: backend/gateway
          file: backend/gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/gateway:${{ steps.meta.outputs.sha }}
            ghcr.io/${{ github.repository }}/gateway:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          build-args: VITE_API_URL=/api
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ steps.meta.outputs.sha }}
            ghcr.io/${{ github.repository }}/frontend:latest

      - name: Build & push backend services
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.sha }}"
          for svc in auth-service company-service driver-service fleet-service manifest-service tripsheet-service accounting-service notification-service; do
            docker build -t "ghcr.io/${{ github.repository }}/${svc}:${TAG}" \
              -t "ghcr.io/${{ github.repository }}/${svc}:latest" \
              -f "backend/services/${svc}/Dockerfile" \
              "backend/services/${svc}"
            docker push "ghcr.io/${{ github.repository }}/${svc}:${TAG}"
            docker push "ghcr.io/${{ github.repository }}/${svc}:latest"
          done

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          REQUESTED_COLOR: ${{ github.event.inputs.color }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          install -m 600 /dev/null key
          printf '%s\n' "$SSH_KEY" > key
          COLOR="${REQUESTED_COLOR:-}"
          if [[ -z "${COLOR}" ]]; then
            COLOR=$(ssh -i key -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" \
              'grep -E "^ACTIVE_COLOR=" /opt/tripsheet/secrets/edge.env | cut -d= -f2 || echo blue')
            if [[ "${COLOR}" == "blue" ]]; then COLOR=green; else COLOR=blue; fi
          fi
          ssh -i key -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" bash -s <<EOF
          set -euo pipefail
          cd /opt/tripsheet/repo
          git fetch --all
          git checkout ${GITHUB_SHA}
          sed -i 's|^IMAGE_REGISTRY=.*|IMAGE_REGISTRY=ghcr.io/${{ github.repository }}|' /opt/tripsheet/secrets/app.env
          sed -i 's|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|' /opt/tripsheet/secrets/app.env
          echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
          ./deploy/scripts/deploy.sh ${COLOR} ${IMAGE_TAG}
          EOF
